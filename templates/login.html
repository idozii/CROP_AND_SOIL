{% extends "base.html" %}

{% block title %}Login | Crop IQ{% endblock %}

{% block content %}
<div class="glass-panel p-4 p-md-5 mx-auto" style="max-width: 560px;">
    <h1 class="brand-title mb-2">Welcome Back</h1>
    <p class="soft-muted mb-4">Log in to access your personalized crop predictions.</p>

    <form method="POST" action="{{ url_for('login') }}" class="row g-3">
        <div class="col-12">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-12">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" minlength="8" required>
        </div>
        <div class="col-12 d-grid mt-3">
            <button type="submit" class="btn btn-brand btn-lg">Log In</button>
        </div>
    </form>

    <p class="mt-4 mb-0 soft-muted">
        New here?
        <a href="{{ url_for('signup') }}" class="link-success fw-semibold">Create an account</a>
    </p>
</div>
{% endblock %}
