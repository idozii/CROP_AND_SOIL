{% extends "base.html" %}

{% block title %}Error | Crop IQ{% endblock %}

{% block content %}
<div class="glass-panel p-4 p-md-5 mx-auto text-center" style="max-width: 700px;">
    <h1 class="display-5 mb-2">Something Went Wrong</h1>
    <p class="soft-muted mb-4">The app could not complete your request.</p>

    <div class="alert alert-danger text-start" role="alert">
        {{ error }}
    </div>

    <a href="{{ url_for('home') }}" class="btn btn-brand">Return to Dashboard</a>
</div>
{% endblock %}
