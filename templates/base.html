<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Crop IQ{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f3efe3;
            --surface: #fffdf8;
            --ink: #1f3a2f;
            --muted: #5f6f63;
            --brand: #1d8f5a;
            --brand-dark: #14623f;
            --accent: #f1a44d;
            --danger: #a63638;
            --ring: rgba(29, 143, 90, 0.22);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Space Grotesk", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 10% 20%, rgba(29, 143, 90, 0.18), transparent 35%),
                radial-gradient(circle at 85% 10%, rgba(241, 164, 77, 0.25), transparent 40%),
                linear-gradient(160deg, #f7f3e8 0%, #eef6ef 100%);
        }

        .app-shell {
            width: min(1100px, 94%);
            margin: 2rem auto;
        }

        .glass-panel {
            background: var(--surface);
            border: 1px solid rgba(31, 58, 47, 0.1);
            border-radius: 1.25rem;
            box-shadow: 0 20px 60px rgba(34, 53, 44, 0.15);
        }

        .btn-brand {
            background: var(--brand);
            border-color: var(--brand);
            color: #ffffff;
            font-weight: 600;
        }

        .btn-brand:hover,
        .btn-brand:focus {
            background: var(--brand-dark);
            border-color: var(--brand-dark);
            color: #ffffff;
        }

        .brand-title {
            letter-spacing: 0.4px;
            font-weight: 700;
        }

        .soft-muted {
            color: var(--muted);
        }

        .form-control:focus,
        .form-select:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 0.25rem var(--ring);
        }

        .fade-up {
            animation: fadeUp 0.55s ease both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .app-shell {
                width: 96%;
                margin: 1rem auto;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <div class="app-shell fade-up">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
